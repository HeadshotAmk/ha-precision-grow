# Precision Grow — ESP32 D1 Mini sensor node
# SHT31 (temp/RH) + HX711 (2x 10kg load cells / dryback)
# + JSN-SR04T (reservoir, ultrasonic) + float switch (humidifier tank empty)
#
# Reservoir: JSN-SR04T reports distance in mm. The integration calibrates
# 2-point (empty/full) via the buttons — NO % conversion needed here.
# (Ultrasonic is used instead of a laser ToF sensor, which reads water poorly.)

substitutions:
  node_name: grow-sensor-esp32
  friendly_name: Grow Sensor

esphome:
  name: ${node_name}
  friendly_name: ${friendly_name}

esp32:
  board: wemos_d1_mini32
  framework:
    type: arduino

logger:
api:
  encryption:
    key: !secret api_encryption_key
ota:
  - platform: esphome
    password: !secret ota_password
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

# --- I2C for SHT31 ---
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  frequency: 100kHz

sensor:
  # Temperature + humidity
  - platform: sht3xd
    address: 0x44
    update_interval: 30s
    temperature:
      name: "${friendly_name} Temperature"
      id: grow_temp
    humidity:
      name: "${friendly_name} Humidity"
      id: grow_humidity

  # Load cell (dryback) — HX711
  # Two 10 kg half-bridge cells wire into ONE full bridge on a single HX711
  # (E+/E- across the pair, A+/A- to the two signal wires). One weight value.
  - platform: hx711
    name: "${friendly_name} Weight"
    id: grow_weight
    dout_pin: GPIO16
    clk_pin: GPIO17
    gain: 128
    update_interval: 30s
    unit_of_measurement: "g"
    accuracy_decimals: 0
    filters:
      # Calibration: (raw - empty_offset) * factor.
      # Determine values from two known weights and enter them here.
      - calibrate_linear:
          - 0.0 -> 0.0
          - 430000.0 -> 1000.0
      - sliding_window_moving_average:
          window_size: 5
          send_every: 5

  # Reservoir level (JSN-SR04T ultrasonic, distance in mm)
  # NOTE: JSN-SR04T echo is 5 V — use a voltage divider on the echo pin
  # (e.g. 1k/2k) for the 3.3 V ESP32. Blind zone ~25 cm, so mount the sensor
  # at least ~25 cm above the full water level.
  - platform: ultrasonic
    trigger_pin: GPIO5
    echo_pin: GPIO18
    name: "${friendly_name} Reservoir distance"
    id: grow_reservoir
    update_interval: 30s
    unit_of_measurement: "mm"
    accuracy_decimals: 0
    timeout: 2.0m
    filters:
      - multiply: 1000.0   # m -> mm
      - sliding_window_moving_average:
          window_size: 5
          send_every: 5

binary_sensor:
  # Float switch: humidifier tank empty (GPIO with internal pullup)
  - platform: gpio
    name: "${friendly_name} Humidifier tank empty"
    id: humidifier_tank_empty
    pin:
      number: GPIO14
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on_off: 2s
