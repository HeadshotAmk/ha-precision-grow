# Precision Grow — substrate sensor example (THC-S / ComWinTop TH-S, RS485 Modbus)
# ---------------------------------------------------------------------------
# Cheap TEROS-12 alternative (~30 EUR): VWC + bulk EC + substrate temperature.
# Wiring: THC-S <-> RS485-to-TTL module (e.g. MAX485/XY-017) <-> ESP32.
#   THC-S A  -> RS485 A          RS485 RX/TX -> GPIO16/GPIO17 (UART2)
#   THC-S B  -> RS485 B          THC-S power -> 5-12 V
# Map in Precision Grow (step 3, sensor mapping):
#   Substrate VWC %      -> sensor.<node>_substrate_vwc
#   Substrate bulk EC    -> sensor.<node>_substrate_bulk_ec
#   Substrate temperature-> sensor.<node>_substrate_temperature
# The integration computes pore-water EC (Hilhorst) from VWC + bulk EC + temp.
# ---------------------------------------------------------------------------
esphome:
  name: grow-substrate
  friendly_name: Grow substrate sensor

esp32:
  board: esp32dev

api:
ota:
  - platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
logger:

uart:
  id: modbus_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 4800        # THC-S factory default
  stop_bits: 1

modbus:
  id: modbus_bus
  uart_id: modbus_uart

modbus_controller:
  - id: thcs
    address: 0x01        # factory default slave address
    modbus_id: modbus_bus
    update_interval: 30s

sensor:
  # Raw "moisture" register — needs media calibration (see lambda below)
  - platform: modbus_controller
    modbus_controller_id: thcs
    name: Substrate VWC raw
    id: substrate_vwc_raw
    register_type: holding
    address: 0x0000
    unit_of_measurement: "%"
    value_type: U_WORD
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    internal: true

  # Calibrated VWC for coco coir (community calibration for THC-S in coco;
  # for rockwool or soil, recalibrate: measure raw in dry + saturated media
  # and fit min/max). Simple two-point linear scaling:
  - platform: template
    name: Substrate VWC
    id: substrate_vwc
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 30s
    lambda: |-
      // two-point calibration: raw_dry -> 0 %, raw_sat -> 100 %
      const float raw_dry = 0.0;    // raw reading in air-dry coco
      const float raw_sat = 55.0;   // raw reading fully saturated
      float raw = id(substrate_vwc_raw).state;
      if (isnan(raw)) return NAN;
      float vwc = (raw - raw_dry) / (raw_sat - raw_dry) * 100.0;
      return clamp(vwc, 0.0f, 100.0f);

  - platform: modbus_controller
    modbus_controller_id: thcs
    name: Substrate temperature
    register_type: holding
    address: 0x0001
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    value_type: S_WORD
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: thcs
    name: Substrate bulk EC
    register_type: holding
    address: 0x0002
    unit_of_measurement: "mS/cm"
    state_class: measurement
    value_type: U_WORD
    accuracy_decimals: 2
    filters:
      - multiply: 0.001   # register is uS/cm
